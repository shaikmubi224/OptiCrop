<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Find Your Crop</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav>

<div class="logo">🌾 OptiCrop</div>

<ul>

<li><a href="{{ url_for('home') }}">Home</a></li>
<li><a href="{{ url_for('about') }}">About</a></li>
<li><a href="{{ url_for('prediction') }}">Find Your Crop</a></li>
<li><a href="{{ url_for('contact') }}">Contact</a></li>

</ul>

</nav>

<section class="features">

<h2>Find Your Best Crop</h2>

<div class="prediction-card">

<form action="{{ url_for('predict') }}" method="POST">

<div class="input-grid">

<div>
<label>Nitrogen (N)</label>
<input type="number" step="any" name="nitrogen" required>
</div>

<div>
<label>Phosphorous (P)</label>
<input type="number" step="any" name="phosphorous" required>
</div>

<div>
<label>Potassium (K)</label>
<input type="number" step="any" name="potassium" required>
</div>

<div>
<label>Temperature (°C)</label>
<input type="number" step="any" name="temperature" required>
</div>

<div>
<label>Humidity (%)</label>
<input type="number" step="any" name="humidity" required>
</div>

<div>
<label>Soil pH</label>
<input type="number" step="any" name="ph" required>
</div>

<div>
<label>Rainfall (mm)</label>
<input type="number" step="any" name="rainfall" required>
</div>

</div>

<button class="predict-btn" type="submit">

🌱 Predict Crop

</button>

</form>

{% if prediction_text %}

<div class="result-card">

<h2>{{ prediction_text }}</h2>

</div>

{% endif %}

</div>

</section>

</body>

</html>
